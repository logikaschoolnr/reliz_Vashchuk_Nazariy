<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Реєстрація лаванда</title>
<link rel="stylesheet" href="style3.css">
</head>

<body>

<div class="container">

<form class="form">

<h2>РЕЄСТРАЦІЯ ЛАВАНДА</h2>

<label>Ім'я</label>
<input type="text" placeholder="Введіть ім'я" required>

<label>Прізвище</label>
<input type="text" placeholder="Введіть прізвище" required>

<label>Email</label>
<input type="email" placeholder="example@email.com" required>

<label>Пароль</label>
<input type="password" placeholder="Введіть пароль" required>

<label>Країна</label>
<select>
<option>Україна</option>
<option>ОАЕ</option>
<option>Польща</option>
<option>Німеччина</option>
</select>

<button type="submit">Зареєструватися</button>

</form>

</div>

</body>
</html>
